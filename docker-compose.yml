services:
  api:
    build: .
    profiles: ["backend", "demo"]
    environment:
      PHYSICAL_AI_CONFIG: configs/local.json
    ports:
      - "8080:8080"
    volumes:
      - observability-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  edge-worker:
    build: .
    profiles: ["worker", "demo"]
    environment:
      PHYSICAL_AI_CONFIG: configs/local.json
    depends_on:
      api:
        condition: service_healthy
    command:
      - python
      - -m
      - edge.worker
      - --config
      - configs/local.json
      - --source
      - examples/sample_source.json
      - --backend
      - http://api:8080

volumes:
  observability-data:
